<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Camino - Classement</title>
  <meta name="description" content="Classement Camino : podium et liste complète des meilleurs scores par zone et mode.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@600;700&family=Montserrat:wght@600;800&family=Nunito:wght@400;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="/style.css?v=20260320p2">
</head>

<body class="meta-page-body">
  <main class="meta-shell">
    <header class="meta-topbar">
      <a class="meta-back-link" href="/">← Retour au jeu</a>
      <nav class="meta-nav" aria-label="Navigation">
        <a class="meta-nav-link" href="/">Jeu</a>
        <a class="meta-nav-link" href="/profil.html">Profil</a>
        <a class="meta-nav-link is-active" href="/classement.html">Classement</a>
        <a class="meta-nav-link" href="/daily-resultats.html">Daily</a>
        <a class="meta-nav-link" href="/regles.html">Règles</a>
      </nav>
    </header>

    <section class="meta-hero">
      <h1 class="meta-title">Classement Camino</h1>
      <p class="meta-subtitle">Podium et classement détaillé par zone et mode de jeu.</p>
    </section>

    <section class="meta-card" aria-label="Filtres classement">
      <h2 class="meta-card-title">Vue</h2>
      <div class="meta-controls-row" id="period-controls">
        <button type="button" class="meta-filter-btn is-active" data-period="all">All-time</button>
        <button type="button" class="meta-filter-btn" data-period="month">Mensuel</button>
      </div>
      <label for="board-select" class="meta-inline-note">Tableau affiché</label>
      <select id="board-select" class="meta-select" aria-label="Choisir un tableau de classement"></select>
    </section>

    <div class="meta-grid meta-grid--two">
      <section class="meta-card">
        <h2 class="meta-card-title">Podium</h2>
        <div id="podium" class="meta-podium"></div>
      </section>

      <section class="meta-card">
        <h2 class="meta-card-title">Votre position</h2>
        <div id="you-rank" class="meta-you-rank">Connectez-vous pour afficher votre rang.</div>
      </section>
    </div>

    <section class="meta-card" style="margin-top: 12px;">
      <h2 class="meta-card-title">Classement complet</h2>
      <div id="leaderboard-list" class="meta-list"></div>
    </section>

    <p id="leaderboard-status" class="meta-inline-note" style="margin-top: 10px;"></p>
  </main>

  <script>
    (function () {
      const API_URL =
        window.location.hostname === "localhost" ||
          window.location.hostname === "127.0.0.1" ||
          window.location.protocol === "file:"
          ? "http://localhost:3000"
          : "https://camino2.onrender.com";

      const ZONE_LABELS = {
        ville: "Ville entière",
        "rues-principales": "Rues principales",
        "rues-celebres": "Rues célèbres",
        quartier: "Quartier",
        monuments: "Monuments",
      };

      const GAME_LABELS = {
        classique: "Classique",
        marathon: "Marathon",
        chrono: "Chrono",
        lecture: "Lecture",
      };

      const TITLE_NAMES = [
        "🏛️ Maire de la Ville",
        "💪 Vrai Marseillais",
        "⚓ Habitué du Vieux-Port",
        "🧒 Minot",
        "🧳 Touriste",
      ];

      const TITLE_THRESHOLDS_BY_MODE = {
        classique: {
          "rues-celebres": { M: 60, H: 100, V: 140, MV: 180 },
          "rues-principales": { M: 50, H: 90, V: 130, MV: 170 },
          quartier: { M: 40, H: 80, V: 120, MV: 160 },
          ville: { M: 30, H: 70, V: 110, MV: 150 },
          monuments: { M: 40, H: 80, V: 120, MV: 160 },
        },
        marathon: {
          "rues-celebres": { M: 10, H: 20, V: 35, MV: 55 },
          "rues-principales": { M: 9, H: 18, V: 30, MV: 48 },
          ville: { M: 8, H: 16, V: 28, MV: 44 },
          monuments: { M: 9, H: 18, V: 30, MV: 46 },
        },
        chrono: {
          "rues-celebres": { M: 7, H: 11, V: 16, MV: 22 },
          "rues-principales": { M: 6, H: 10, V: 14, MV: 19 },
          quartier: { M: 5, H: 8, V: 12, MV: 16 },
          ville: { M: 4, H: 7, V: 10, MV: 14 },
          monuments: { M: 5, H: 8, V: 12, MV: 16 },
        },
      };

      const zoneOrder = ["rues-celebres", "rues-principales", "quartier", "ville", "monuments"];
      const gameOrder = ["classique", "marathon", "chrono", "lecture"];

      function escapeHtml(value) {
        return String(value == null ? "" : value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/\"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function readCurrentUser() {
        try {
          return JSON.parse(window.localStorage.getItem("camino_user") || "null");
        } catch (error) {
          return null;
        }
      }

      function buildQuartierMarathonThresholds(maxItems) {
        const total = Math.max(1, parseInt(maxItems, 10) || 55);
        const minot = Math.min(total, Math.max(1, Math.ceil(0.1 * total)));
        const habitue = Math.min(total, Math.max(minot + 1, Math.ceil(0.2 * total)));
        const vrai = Math.min(total, Math.max(habitue + 1, Math.ceil(0.35 * total)));
        const maire = Math.min(total, Math.max(vrai + 1, Math.ceil(0.55 * total)));
        return { M: minot, H: habitue, V: vrai, MV: maire };
      }

      function getTitleThresholds(mode, gameType, maxItems) {
        const modeThresholds = TITLE_THRESHOLDS_BY_MODE[gameType] || TITLE_THRESHOLDS_BY_MODE.classique;
        if (gameType === "marathon" && mode === "quartier") {
          return buildQuartierMarathonThresholds(maxItems);
        }
        return modeThresholds[mode] || modeThresholds.quartier || TITLE_THRESHOLDS_BY_MODE.classique.quartier;
      }

      function getTitleScoreValue(highScore, bestItemsCorrect, gameType) {
        if (gameType === "classique") {
          return parseFloat(highScore) || 0;
        }
        const parsed = parseFloat(bestItemsCorrect);
        return Number.isFinite(parsed) ? parsed : parseFloat(highScore) || 0;
      }

      function getPlayerTitle(score, zoneMode, gameType, itemsTotal, itemsCorrect) {
        const thresholds = getTitleThresholds(zoneMode, gameType || "classique", itemsTotal || 0);
        const scoreValue = getTitleScoreValue(score, itemsCorrect, gameType || "classique");
        return scoreValue >= thresholds.MV
          ? TITLE_NAMES[0]
          : scoreValue >= thresholds.V
            ? TITLE_NAMES[1]
            : scoreValue >= thresholds.H
              ? TITLE_NAMES[2]
              : scoreValue >= thresholds.M
                ? TITLE_NAMES[3]
                : TITLE_NAMES[4];
      }

      function sortBoardEntries(entries) {
        return entries.slice().sort((left, right) => {
          const [lz, lg, lq] = left[0].split("|");
          const [rz, rg, rq] = right[0].split("|");
          const z = zoneOrder.indexOf(lz) - zoneOrder.indexOf(rz);
          if (z !== 0) return z;
          const g = gameOrder.indexOf(lg) - gameOrder.indexOf(rg);
          if (g !== 0) return g;
          return String(lq || "").localeCompare(String(rq || ""), "fr");
        });
      }

      function boardLabel(key) {
        const parts = key.split("|");
        const zoneMode = parts[0] || "ville";
        const gameType = parts[1] || "classique";
        const quartier = parts[2] && parts[2] !== "null" ? parts[2] : "";
        const base = (ZONE_LABELS[zoneMode] || zoneMode) + " • " + (GAME_LABELS[gameType] || gameType);
        return quartier ? base + " • " + quartier : base;
      }

      function formatScore(row, gameType) {
        if (gameType === "classique") {
          return typeof row.high_score === "number" ? row.high_score.toFixed(1) : "0.0";
        }
        return String(row.items_correct || 0);
      }

      const statusEl = document.getElementById("leaderboard-status");
      const boardSelect = document.getElementById("board-select");
      const podiumEl = document.getElementById("podium");
      const listEl = document.getElementById("leaderboard-list");
      const youRankEl = document.getElementById("you-rank");

      let currentPeriod = "all";
      let currentBoards = {};

      function setStatus(message) {
        statusEl.textContent = message;
      }

      function renderBoard(selectedKey) {
        const rows = Array.isArray(currentBoards[selectedKey]) ? currentBoards[selectedKey] : [];
        if (!rows.length) {
          podiumEl.innerHTML = "<p class=\"meta-empty\">Aucun score sur ce tableau.</p>";
          listEl.innerHTML = "";
          youRankEl.textContent = "Aucun score trouvé pour ce tableau.";
          return;
        }

        const [zoneMode, gameType] = selectedKey.split("|");
        const topThree = rows.slice(0, 3);

        podiumEl.innerHTML = topThree.map((row, index) => {
          const title = getPlayerTitle(
            row.high_score || 0,
            zoneMode,
            gameType,
            row.items_total || 0,
            row.items_correct || 0,
          );
          return `
            <article class="meta-podium-card">
              <div class="meta-podium-rank">#${index + 1}</div>
              <div class="meta-podium-avatar">${escapeHtml(row.avatar || "👤")}</div>
              <div class="meta-podium-name">${escapeHtml(row.username || "Anonyme")}</div>
              <div class="meta-podium-title">${escapeHtml(title)}</div>
              <div class="meta-podium-score">${escapeHtml(formatScore(row, gameType))}</div>
            </article>`;
        }).join("");

        listEl.innerHTML = rows.map((row, index) => {
          const title = getPlayerTitle(
            row.high_score || 0,
            zoneMode,
            gameType,
            row.items_total || 0,
            row.items_correct || 0,
          );
          return `
            <article class="meta-list-card">
              <div class="meta-list-rank">#${index + 1}</div>
              <div class="meta-list-player">
                <div class="meta-list-name"><span>${escapeHtml(row.avatar || "👤")}</span><span>${escapeHtml(row.username || "Anonyme")}</span></div>
                <div class="meta-list-title">${escapeHtml(title)}</div>
              </div>
              <div class="meta-list-score">${escapeHtml(formatScore(row, gameType))}</div>
            </article>`;
        }).join("");

        const currentUser = readCurrentUser();
        const currentUsername = String(currentUser && currentUser.username ? currentUser.username : "").trim().toLowerCase();
        if (!currentUsername) {
          youRankEl.textContent = "Connectez-vous pour afficher votre rang sur ce tableau.";
          return;
        }

        const userIndex = rows.findIndex((row) => String(row && row.username ? row.username : "").trim().toLowerCase() === currentUsername);
        if (userIndex >= 0) {
          const userRow = rows[userIndex] || {};
          youRankEl.innerHTML = `Vous êtes <strong>#${userIndex + 1}</strong> (${escapeHtml(formatScore(userRow, gameType))}).`;
        } else {
          youRankEl.textContent = "Vous n'êtes pas classé sur ce tableau pour le moment.";
        }
      }

      function applyBoardOptions(entries, preferred) {
        boardSelect.innerHTML = entries.map(([key]) => `<option value="${escapeHtml(key)}">${escapeHtml(boardLabel(key))}</option>`).join("");
        if (!entries.length) {
          boardSelect.innerHTML = "";
          return null;
        }

        if (preferred && entries.some(([key]) => key === preferred)) {
          boardSelect.value = preferred;
          return preferred;
        }

        const defaultKey = [
          "ville|classique|",
          "rues-principales|classique|",
          "quartier|classique|",
          "rues-celebres|classique|",
          "monuments|classique|",
        ].find((candidate) => entries.some(([key]) => key === candidate)) || entries[0][0];

        boardSelect.value = defaultKey;
        return defaultKey;
      }

      async function loadLeaderboards() {
        setStatus("Chargement des classements…");
        const previous = boardSelect.value;
        const periodSuffix = currentPeriod === "month" ? "?period=month" : "";

        try {
          const response = await fetch(`${API_URL}/api/leaderboards${periodSuffix}`);
          if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
          }

          const payload = await response.json();
          currentBoards = payload || {};
          const entries = sortBoardEntries(
            Object.entries(currentBoards).filter((entry) => Array.isArray(entry[1]) && entry[1].length > 0),
          );

          if (!entries.length) {
            podiumEl.innerHTML = "<p class=\"meta-empty\">Aucun score enregistré pour cette période.</p>";
            listEl.innerHTML = "";
            youRankEl.textContent = "Aucun classement disponible.";
            boardSelect.innerHTML = "";
            setStatus(currentPeriod === "month" ? "Période mensuelle vide." : "Aucun score enregistré.");
            return;
          }

          const selectedKey = applyBoardOptions(entries, previous);
          renderBoard(selectedKey);
          setStatus(`${entries.length} tableaux disponibles (${currentPeriod === "month" ? "mensuel" : "all-time"}).`);
        } catch (error) {
          console.warn("Leaderboard load error:", error);
          podiumEl.innerHTML = "<p class=\"meta-empty\">Impossible de charger le podium.</p>";
          listEl.innerHTML = "";
          youRankEl.textContent = "Classement indisponible.";
          setStatus("Erreur de chargement du classement.");
        }
      }

      boardSelect.addEventListener("change", () => {
        renderBoard(boardSelect.value);
      });

      document.querySelectorAll("#period-controls [data-period]").forEach((button) => {
        button.addEventListener("click", () => {
          const nextPeriod = String(button.getAttribute("data-period") || "all");
          if (nextPeriod === currentPeriod) {
            return;
          }
          currentPeriod = nextPeriod;
          document.querySelectorAll("#period-controls [data-period]").forEach((candidate) => {
            candidate.classList.toggle("is-active", candidate === button);
          });
          loadLeaderboards();
        });
      });

      loadLeaderboards();
    })();
  </script>
</body>

</html>
