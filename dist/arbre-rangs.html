<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Camino - Arbre de progression des rangs</title>
  <meta name="description" content="Visualisez votre progression vers chaque rang global dans Camino.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@600;700&family=Montserrat:wght@600;800&family=Nunito:wght@400;600;700&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --brand-sea-950: #0c1d57;
      --brand-sea-900: #12297a;
      --brand-sea-700: #2d4caa;
      --text-primary: #1e293b;
      --text-secondary: #5f6f84;
      --text-muted: #76879f;
      --border: rgba(18, 41, 122, 0.14);
      --shadow: 0 18px 32px rgba(12, 29, 87, 0.12);
      --radius: 16px;
      --radius-sm: 10px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Nunito", system-ui, sans-serif;
      color: var(--text-primary);
      background:
        radial-gradient(1200px 520px at 10% -10%, rgba(242, 169, 0, 0.14), transparent 60%),
        radial-gradient(1100px 420px at 100% 0%, rgba(64, 87, 178, 0.18), transparent 62%),
        linear-gradient(135deg, #fefbf5 0%, #eef3ff 100%);
      min-height: 100vh;
    }

    .page {
      max-width: 1080px;
      margin: 0 auto;
      padding: 24px 18px 42px;
    }

    .hero {
      background: linear-gradient(145deg, rgba(255, 255, 255, 0.95), rgba(245, 249, 255, 0.94));
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px;
      margin-bottom: 14px;
    }

    .hero-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 700;
      text-decoration: none;
      color: var(--brand-sea-900);
      border: 1px solid rgba(18, 41, 122, 0.28);
      border-radius: 999px;
      padding: 5px 10px;
      background: rgba(255, 255, 255, 0.72);
    }

    h1 {
      margin: 0;
      font-family: "Montserrat", system-ui, sans-serif;
      font-size: clamp(26px, 4.2vw, 36px);
      line-height: 1.05;
      letter-spacing: -0.02em;
      color: var(--brand-sea-950);
    }

    .subtitle {
      margin: 8px 0 0;
      color: var(--text-secondary);
      font-size: 16px;
      max-width: 72ch;
    }

    .global-progress-line {
      margin: 6px 0 0;
      font-size: 13px;
      font-weight: 700;
      color: var(--brand-sea-900);
    }

    .panel {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: 0 10px 22px rgba(12, 29, 87, 0.08);
      padding: 12px;
    }

    .rank-nav {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 6px;
      margin-bottom: 8px;
    }

    .rank-nav-arrow {
      font-size: 12px;
      font-weight: 800;
      color: var(--text-muted);
      line-height: 1;
      user-select: none;
    }

    .rank-tab {
      border: 1px solid rgba(18, 41, 122, 0.18);
      background: rgba(255, 255, 255, 0.95);
      color: var(--brand-sea-950);
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      width: auto;
      min-width: 0;
      min-height: 0;
      margin: 0;
    }

    .rank-tab--current {
      border-color: rgba(18, 41, 122, 0.4);
      box-shadow: inset 0 0 0 1px rgba(18, 41, 122, 0.16);
    }

    .rank-tab--active {
      border-color: rgba(36, 121, 69, 0.45);
      color: #12502f;
      background: rgba(237, 250, 240, 0.98);
    }

    .overview {
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .overview-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
    }

    .overview-count {
      font-family: "JetBrains Mono", ui-monospace, monospace;
      font-size: 13px;
      font-weight: 800;
      color: var(--brand-sea-950);
    }

    .overview-bar {
      height: 6px;
      border-radius: 999px;
      background: rgba(18, 41, 122, 0.12);
      overflow: hidden;
      margin-bottom: 10px;
    }

    .overview-bar span {
      display: block;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #2d4caa 0%, #23895d 100%);
    }

    .tree {
      width: 100%;
    }

    .tree-target-row {
      display: flex;
      justify-content: center;
      margin-bottom: 6px;
    }

    .rank-pair-mobile {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-bottom: 8px;
    }

    .rank-pair-arrow {
      font-size: 14px;
      font-weight: 800;
      color: var(--text-muted);
      line-height: 1;
    }

    .tree-body {
      display: grid;
      grid-template-columns: minmax(92px, 120px) 1fr;
      gap: 10px;
      align-items: stretch;
    }

    .tree-current-col {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .tree-current-col::after {
      content: "";
      position: absolute;
      right: -10px;
      top: 50%;
      width: 10px;
      height: 2px;
      margin-top: -1px;
      border-radius: 999px;
      background: rgba(18, 41, 122, 0.2);
    }

    .rank-node {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.95);
      padding: 6px 8px;
      font-size: 11px;
      font-weight: 800;
      line-height: 1.2;
      text-align: center;
      box-shadow: 0 3px 10px rgba(18, 41, 122, 0.08);
      width: 100%;
      max-width: 210px;
    }

    .rank-node--current {
      color: var(--brand-sea-900);
      border-color: rgba(18, 41, 122, 0.24);
    }

    .rank-node--target {
      color: #12502f;
      border-color: rgba(36, 121, 69, 0.3);
      background: rgba(237, 250, 240, 0.96);
    }

    .tree-branches {
      position: relative;
      padding-left: 18px;
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .tree-branches::before {
      content: "";
      position: absolute;
      left: 3px;
      top: 16px;
      bottom: 16px;
      width: 2px;
      border-radius: 999px;
      background: rgba(18, 41, 122, 0.2);
    }

    .branch-row {
      position: relative;
    }

    .branch-row::before {
      content: "";
      position: absolute;
      left: -15px;
      top: 16px;
      width: 15px;
      height: 2px;
      border-radius: 999px;
      background: rgba(18, 41, 122, 0.2);
    }

    .zone-box {
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 6px;
      background: rgba(255, 255, 255, 0.92);
    }

    .zone-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
      margin-bottom: 4px;
    }

    .zone-title {
      margin: 0;
      font-family: "Montserrat", system-ui, sans-serif;
      font-size: 12px;
      color: var(--brand-sea-950);
      line-height: 1.2;
    }

    .zone-count {
      font-size: 10px;
      font-family: "JetBrains Mono", ui-monospace, monospace;
      color: var(--text-secondary);
    }

    .mode-grid {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      width: 100%;
    }

    .mode-card {
      border: 1px solid rgba(18, 41, 122, 0.16);
      border-radius: 7px;
      padding: 4px;
      background: rgba(245, 248, 255, 0.9);
      min-height: 54px;
      width: 207px;
      flex: 0 0 auto;
    }

    .mode-card.done {
      background: rgba(233, 250, 238, 0.95);
      border-color: rgba(38, 131, 77, 0.36);
    }

    .mode-card.pending {
      background: rgba(255, 247, 231, 0.95);
      border-color: rgba(172, 114, 31, 0.35);
    }

    .mode-card.new {
      background: rgba(243, 247, 251, 0.95);
      border-color: rgba(101, 121, 149, 0.26);
    }

    .mode-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 4px;
      margin-bottom: 2px;
    }

    .mode-name {
      font-size: 9px;
      font-weight: 800;
      color: var(--brand-sea-950);
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .mode-state {
      font-size: 8px;
      color: var(--text-secondary);
      white-space: nowrap;
    }

    .mode-line {
      font-family: "JetBrains Mono", ui-monospace, monospace;
      font-size: 9px;
      font-weight: 700;
      color: var(--brand-sea-950);
    }

    .mode-sub {
      margin-top: 1px;
      font-size: 8px;
      color: var(--text-muted);
      min-height: 10px;
    }

    .mode-bar {
      margin-top: 2px;
      height: 3px;
      border-radius: 999px;
      background: rgba(18, 41, 122, 0.1);
      overflow: hidden;
    }

    .mode-bar span {
      display: block;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #2f67cf 0%, #23895d 100%);
    }

    .touriste-panel {
      border: 1px solid var(--border);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.95);
      padding: 12px;
      color: var(--text-secondary);
      font-size: 13px;
      line-height: 1.4;
    }

    .touriste-panel strong {
      color: var(--brand-sea-900);
    }

    .status-box {
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: rgba(255, 255, 255, 0.88);
      padding: 12px;
      color: var(--text-secondary);
      font-size: 14px;
    }

    .status-box a {
      color: var(--brand-sea-900);
      font-weight: 700;
    }

    .hidden {
      display: none;
    }

    @media (max-width: 900px) {
      .page {
        padding: 14px 12px 28px;
      }

      .hero,
      .panel {
        padding: 10px;
      }

      .tree-body {
        grid-template-columns: 1fr;
      }

      .desktop-only {
        display: none !important;
      }

      .rank-pair-mobile {
        display: flex;
      }

      .rank-pair-mobile .rank-node {
        width: auto;
        min-width: 120px;
      }

      .tree-current-col::after {
        display: none;
      }

      .tree-current-col {
        justify-content: center;
      }

      .tree-branches {
        padding-left: 14px;
      }

      .mode-grid {
        gap: 8px;
      }

      .mode-card {
        width: calc((100% - 16px) / 3);
        min-width: 0;
      }

      .rank-tab {
        font-size: 10px;
        padding: 4px 8px;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <header class="hero">
      <div class="hero-top">
        <a class="back-link" href="/">← Retour au jeu</a>
      </div>
      <h1>Arbre de progression des rangs</h1>
      <p id="subtitle" class="subtitle">Chargement du joueur…</p>
      <p id="global-progress-line" class="global-progress-line hidden"></p>
    </header>

    <section class="panel">
      <div id="status-box" class="status-box">Chargement…</div>
      <div id="progress-root" class="hidden">
        <div id="rank-nav" class="rank-nav"></div>
        <div class="overview">
          <span id="overview-label" class="overview-label">Conditions à atteindre</span>
          <span id="overview-count" class="overview-count">0/15</span>
        </div>
        <div class="overview-bar"><span id="overview-bar-fill" style="width:0%"></span></div>
        <div id="tree" class="tree"></div>
      </div>
    </section>
  </main>

  <script>
    (function () {
      const USER_STORAGE_KEY = "camino_user";
      const API_URL =
        window.location.hostname === "localhost" ||
        window.location.hostname === "127.0.0.1" ||
        window.location.protocol === "file:"
          ? "http://localhost:3000"
          : "https://camino2.onrender.com";

      const TITLE_THRESHOLDS_BY_MODE = {
        classique: {
          "rues-celebres": { M: 60, H: 100, V: 140, MV: 180 },
          "quartiers-ville": { M: 60, H: 100, V: 140, MV: 180 },
          "rues-principales": { M: 50, H: 90, V: 130, MV: 170 },
          quartier: { M: 40, H: 80, V: 120, MV: 160 },
          monuments: { M: 40, H: 80, V: 120, MV: 160 },
        },
        marathon: {
          "rues-celebres": { M: 10, H: 20, V: 35, MV: 55 },
          "quartiers-ville": { M: 10, H: 20, V: 35, MV: 55 },
          "rues-principales": { M: 9, H: 18, V: 30, MV: 48 },
          monuments: { M: 9, H: 18, V: 30, MV: 46 },
        },
        chrono: {
          "rues-celebres": { M: 7, H: 11, V: 16, MV: 22 },
          "quartiers-ville": { M: 7, H: 11, V: 16, MV: 22 },
          "rues-principales": { M: 6, H: 10, V: 14, MV: 19 },
          quartier: { M: 5, H: 8, V: 12, MV: 16 },
          monuments: { M: 5, H: 8, V: 12, MV: 16 },
        },
      };

      const GAME_TYPES = ["classique", "marathon", "chrono"];
      const ZONES = ["rues-celebres", "rues-principales", "quartier", "monuments", "quartiers-ville"];

      const GAME_LABELS = {
        classique: "Classique",
        marathon: "Marathon",
        chrono: "Chrono",
      };

      const ZONE_LABELS = {
        "rues-celebres": "Rues célèbres",
        "rues-principales": "Rues principales",
        quartier: "Rues par quartier",
        monuments: "Monuments",
        "quartiers-ville": "Quartiers de la ville",
      };

      const RANK_FLOW = [
        { letter: null, label: "🧳 Touriste" },
        { letter: "M", label: "🧒 Minot" },
        { letter: "H", label: "⚓ Habitué du Vieux-Port" },
        { letter: "V", label: "💪 Vrai Marseillais" },
        { letter: "MV", label: "🏛️ Maire de la Ville" },
      ];

      let loadedProfile = null;
      let currentRankLevel = 0;
      let activeTargetIndex = 1;

      function toNumber(value, fallback = 0) {
        const parsed = Number.parseFloat(value);
        return Number.isFinite(parsed) ? parsed : fallback;
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/\"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function buildQuartierMarathonThresholds(maxItems) {
        const total = Math.max(1, parseInt(maxItems, 10) || 55);
        const minot = Math.min(total, Math.max(1, Math.ceil(0.1 * total)));
        const habitue = Math.min(total, Math.max(minot + 1, Math.ceil(0.2 * total)));
        const vrai = Math.min(total, Math.max(habitue + 1, Math.ceil(0.35 * total)));
        const maire = Math.min(total, Math.max(vrai + 1, Math.ceil(0.55 * total)));
        return { M: minot, H: habitue, V: vrai, MV: maire };
      }

      function getTitleThresholds(mode, gameType, maxItems) {
        const modeThresholds = TITLE_THRESHOLDS_BY_MODE[gameType] || TITLE_THRESHOLDS_BY_MODE.classique;
        if (gameType === "marathon" && mode === "quartier") {
          return buildQuartierMarathonThresholds(maxItems);
        }
        return modeThresholds[mode] || modeThresholds.quartier || TITLE_THRESHOLDS_BY_MODE.classique[mode];
      }

      function getTitleScoreValue(highScore, bestItemsCorrect, gameType) {
        if (gameType === "classique") {
          return toNumber(highScore, 0);
        }
        const parsedItems = Number.parseFloat(bestItemsCorrect);
        return Number.isFinite(parsedItems) ? parsedItems : toNumber(highScore, 0);
      }

      function buildComboMap(profile) {
        const map = new Map();
        const rows = Array.isArray(profile?.modes) ? profile.modes : [];
        rows.forEach((row) => {
          if (!row || !GAME_TYPES.includes(row.game_type) || !ZONES.includes(row.mode)) {
            return;
          }
          map.set(`${row.mode}|${row.game_type}`, row);
        });
        return map;
      }

      function hasReachedGlobalRank(profile, rankLetter) {
        const combos = buildComboMap(profile);
        return GAME_TYPES.every((gameType) =>
          ZONES.every((zoneMode) => {
            const combo = combos.get(`${zoneMode}|${gameType}`);
            if (!combo) {
              return false;
            }
            const thresholds = getTitleThresholds(zoneMode, gameType, combo.best_items_total || 0);
            const scoreValue = getTitleScoreValue(combo.high_score, combo.best_items_correct, gameType);
            return typeof thresholds?.[rankLetter] === "number" && scoreValue >= thresholds[rankLetter];
          }),
        );
      }

      function getCurrentRankLevel(profile) {
        if (hasReachedGlobalRank(profile, "MV")) {
          return 4;
        }
        if (hasReachedGlobalRank(profile, "V")) {
          return 3;
        }
        if (hasReachedGlobalRank(profile, "H")) {
          return 2;
        }
        if (hasReachedGlobalRank(profile, "M")) {
          return 1;
        }
        return 0;
      }

      function getDisplayValue(value, gameType) {
        const safeValue = toNumber(value, 0);
        return gameType === "classique" ? safeValue.toFixed(1) : String(Math.round(safeValue));
      }

      function getDefaultTargetIndex(level) {
        return level < RANK_FLOW.length - 1 ? level + 1 : level;
      }

      function computeProgress(profile, targetRank) {
        const combos = buildComboMap(profile);
        const hasConditions = !!targetRank?.letter;
        let doneTotal = 0;

        const zones = ZONES.map((zoneMode) => {
          let zoneDone = 0;
          const modes = GAME_TYPES.map((gameType) => {
            const row = combos.get(`${zoneMode}|${gameType}`);
            const thresholds = getTitleThresholds(zoneMode, gameType, row?.best_items_total || 0);
            const targetValue = hasConditions ? thresholds[targetRank.letter] : null;
            const currentValue = hasConditions ? getTitleScoreValue(row?.high_score, row?.best_items_correct, gameType) : 0;
            const reached = hasConditions && !!row && currentValue >= targetValue;
            if (reached) {
              zoneDone += 1;
              doneTotal += 1;
            }

            const missing = hasConditions ? Math.max(0, targetValue - currentValue) : 0;
            const progressPct = hasConditions && targetValue > 0
              ? Math.max(0, Math.min(100, (currentValue / targetValue) * 100))
              : 0;

            const stateLabel = !hasConditions
              ? "Base"
              : reached
                ? "Validé"
                : row
                  ? "À faire"
                  : "Non joué";

            const secondary = !hasConditions
              ? "Aucune condition"
              : reached
                ? "Seuil atteint"
                : row
                  ? `Manque ${getDisplayValue(missing, gameType)}`
                  : "Commencer une partie";

            return {
              gameLabel: GAME_LABELS[gameType] || gameType,
              rowExists: !!row,
              reached,
              currentDisplay: hasConditions ? getDisplayValue(currentValue, gameType) : "—",
              targetDisplay: hasConditions ? getDisplayValue(targetValue, gameType) : "—",
              stateLabel,
              secondary,
              progressPct,
            };
          });

          return {
            zoneLabel: ZONE_LABELS[zoneMode] || zoneMode,
            zoneDone,
            zoneTotal: GAME_TYPES.length,
            modes,
          };
        });

        return {
          zones,
          doneTotal,
          total: ZONES.length * GAME_TYPES.length,
          hasConditions,
        };
      }

      function setLoading(text) {
        const status = document.getElementById("status-box");
        status.classList.remove("hidden");
        status.textContent = text;
        document.getElementById("progress-root").classList.add("hidden");
      }

      function renderDisconnected() {
        const status = document.getElementById("status-box");
        status.classList.remove("hidden");
        status.innerHTML = `
          Connecte-toi d'abord dans Camino pour voir ton arbre de progression.<br>
          Ensuite, reviens ici depuis ton profil.<br><br>
          <a href="/">Aller à la page du jeu</a>`;
        document.getElementById("progress-root").classList.add("hidden");
      }

      function renderError(message) {
        const status = document.getElementById("status-box");
        status.classList.remove("hidden");
        status.innerHTML = `Impossible de charger le profil.<br><strong>${escapeHtml(message)}</strong>`;
        document.getElementById("progress-root").classList.add("hidden");
      }

      function renderRankNav() {
        const nav = document.getElementById("rank-nav");
        let buttonsHtml = "";
        RANK_FLOW.forEach((rank, index) => {
          const classes = ["rank-tab"];
          if (index === currentRankLevel) {
            classes.push("rank-tab--current");
          }
          if (index === activeTargetIndex) {
            classes.push("rank-tab--active");
          }
          buttonsHtml += `<button type="button" class="${classes.join(" ")}" data-rank-index="${index}">${escapeHtml(rank.label)}</button>`;
          if (index < RANK_FLOW.length - 1) {
            buttonsHtml += '<span class="rank-nav-arrow" aria-hidden="true">→</span>';
          }
        });

        nav.innerHTML = buttonsHtml;
        nav.querySelectorAll(".rank-tab").forEach((button) => {
          button.addEventListener("click", () => {
            const idx = parseInt(button.dataset.rankIndex, 10);
            if (!Number.isFinite(idx)) {
              return;
            }
            activeTargetIndex = Math.max(0, Math.min(RANK_FLOW.length - 1, idx));
            renderRankNav();
            renderView();
          });
        });
      }

      function renderView() {
        if (!loadedProfile) {
          return;
        }

        const targetRank = RANK_FLOW[activeTargetIndex] || RANK_FLOW[0];
        const displayedCurrentIndex = activeTargetIndex > 0 ? activeTargetIndex - 1 : 0;
        const currentRank = RANK_FLOW[displayedCurrentIndex] || RANK_FLOW[0];
        const progress = computeProgress(loadedProfile, targetRank);
        const pct = progress.total > 0 ? Math.round((progress.doneTotal / progress.total) * 100) : 0;

        document.getElementById("subtitle").textContent = `${loadedProfile.username || "Joueur"}`;
        const globalLine = document.getElementById("global-progress-line");
        if (progress.hasConditions) {
          globalLine.textContent = `Avancement global vers ${targetRank.label}: ${progress.doneTotal}/${progress.total} (${pct}%)`;
        } else {
          globalLine.textContent = "Rang de départ sélectionné.";
        }
        globalLine.classList.remove("hidden");

        document.getElementById("overview-label").textContent = progress.hasConditions
          ? `Conditions à atteindre pour ${targetRank.label}`
          : "Rang de départ";
        document.getElementById("overview-count").textContent = progress.hasConditions
          ? `${progress.doneTotal}/${progress.total}`
          : "—";
        document.getElementById("overview-bar-fill").style.width = `${progress.hasConditions ? pct : 0}%`;

        if (!progress.hasConditions) {
          const tree = document.getElementById("tree");
          tree.innerHTML = `
            <div class="tree-target-row desktop-only">
              <div class="rank-node rank-node--target">${escapeHtml(targetRank.label)}</div>
            </div>
            <div class="rank-pair-mobile">
              <div class="rank-node rank-node--current">${escapeHtml(currentRank.label)}</div>
              <span class="rank-pair-arrow" aria-hidden="true">→</span>
              <div class="rank-node rank-node--target">${escapeHtml(targetRank.label)}</div>
            </div>
            <div class="touriste-panel">
              <strong>Touriste</strong> est le niveau d'entrée: aucune condition à valider ici.
              <br>
              Clique sur <strong>Minot</strong> dans la barre des rangs pour voir les 15 conditions à atteindre.
            </div>`;

          document.getElementById("status-box").classList.add("hidden");
          document.getElementById("progress-root").classList.remove("hidden");
          return;
        }

        const zonesHtml = progress.zones.map((zone) => {
          const modesHtml = zone.modes.map((mode) => {
            const cardClass = mode.reached
              ? "done"
              : mode.rowExists
                ? "pending"
                : "new";

            return `
              <article class="mode-card ${cardClass}">
                <div class="mode-head">
                  <span class="mode-name">${escapeHtml(mode.gameLabel)}</span>
                  <span class="mode-state">${mode.stateLabel}</span>
                </div>
                <div class="mode-line">${mode.currentDisplay} / ${mode.targetDisplay}</div>
                <div class="mode-sub">${mode.secondary}</div>
                <div class="mode-bar"><span style="width:${mode.progressPct.toFixed(0)}%"></span></div>
              </article>`;
          }).join("");

          return `
            <section class="branch-row">
              <div class="zone-box">
                <div class="zone-head">
                  <h3 class="zone-title">${escapeHtml(zone.zoneLabel)}</h3>
                  <span class="zone-count">${zone.zoneDone}/${zone.zoneTotal}</span>
                </div>
                <div class="mode-grid">${modesHtml}</div>
              </div>
            </section>`;
        }).join("");

        const tree = document.getElementById("tree");
        tree.innerHTML = `
          <div class="tree-target-row desktop-only">
            <div class="rank-node rank-node--target">${escapeHtml(targetRank.label)}</div>
          </div>
          <div class="rank-pair-mobile">
            <div class="rank-node rank-node--current">${escapeHtml(currentRank.label)}</div>
            <span class="rank-pair-arrow" aria-hidden="true">→</span>
            <div class="rank-node rank-node--target">${escapeHtml(targetRank.label)}</div>
          </div>
          <div class="tree-body">
            <div class="tree-current-col desktop-only">
              <div class="rank-node rank-node--current">${escapeHtml(currentRank.label)}</div>
            </div>
            <div class="tree-branches">${zonesHtml}</div>
          </div>`;

        document.getElementById("status-box").classList.add("hidden");
        document.getElementById("progress-root").classList.remove("hidden");
      }

      async function loadProfileAndRender() {
        setLoading("Chargement du profil…");

        let currentUser = null;
        try {
          currentUser = JSON.parse(window.localStorage.getItem(USER_STORAGE_KEY) || "null");
        } catch (_error) {
          currentUser = null;
        }

        if (!currentUser || !currentUser.token) {
          renderDisconnected();
          return;
        }

        try {
          const response = await fetch(`${API_URL}/api/profile`, {
            headers: { Authorization: `Bearer ${currentUser.token}` },
          });

          let payload = null;
          try {
            payload = await response.json();
          } catch (_error) {
            payload = null;
          }

          if (!response.ok) {
            const reason = payload?.error || `HTTP ${response.status}`;
            renderError(reason);
            return;
          }

          loadedProfile = payload || {};
          currentRankLevel = getCurrentRankLevel(loadedProfile);
          activeTargetIndex = getDefaultTargetIndex(currentRankLevel);
          renderRankNav();
          renderView();
        } catch (error) {
          renderError(error?.message || "Erreur réseau");
        }
      }

      loadProfileAndRender();
    })();
  </script>
</body>

</html>
