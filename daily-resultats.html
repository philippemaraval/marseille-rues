<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Camino - Résultats Daily</title>
  <meta name="description" content="Résultats Daily Camino : top du jour, progression et visualisation de la série quotidienne.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@600;700&family=Montserrat:wght@600;800&family=Nunito:wght@400;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="/style.css?v=20260320p2">
</head>

<body class="meta-page-body">
  <main class="meta-shell">
    <header class="meta-topbar">
      <a class="meta-back-link" href="/">← Retour au jeu</a>
      <nav class="meta-nav" aria-label="Navigation">
        <a class="meta-nav-link" href="/">Jeu</a>
        <a class="meta-nav-link" href="/profil.html">Profil</a>
        <a class="meta-nav-link" href="/classement.html">Classement</a>
        <a class="meta-nav-link is-active" href="/daily-resultats.html">Daily</a>
        <a class="meta-nav-link" href="/regles.html">Règles</a>
      </nav>
    </header>

    <section class="meta-hero">
      <h1 class="meta-title">Résultats Daily</h1>
      <p class="meta-subtitle">Votre progression quotidienne, la série en cours et le top du jour.</p>
    </section>

    <div id="daily-root" class="meta-grid">
      <section class="meta-card">
        <p class="meta-inline-note">Chargement des résultats du Daily…</p>
      </section>
    </div>
  </main>

  <script>
    (function () {
      const API_URL =
        window.location.hostname === "localhost" ||
          window.location.hostname === "127.0.0.1" ||
          window.location.protocol === "file:"
          ? "http://localhost:3000"
          : "https://camino2.onrender.com";

      function escapeHtml(value) {
        return String(value == null ? "" : value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/\"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function readCurrentUser() {
        try {
          return JSON.parse(window.localStorage.getItem("camino_user") || "null");
        } catch (error) {
          return null;
        }
      }

      function renderNotConnected(root) {
        root.innerHTML = `
          <section class="meta-card">
            <h2 class="meta-card-title">Connexion requise</h2>
            <p class="meta-inline-note">Le Daily est lié à votre profil joueur.</p>
            <p class="meta-inline-note">Connectez-vous depuis la page de jeu pour voir vos résultats ici.</p>
            <div style="margin-top: 12px;"><a class="meta-back-link" href="/">Ouvrir le jeu</a></div>
          </section>`;
      }

      function toParisDate(date) {
        const raw = new Intl.DateTimeFormat("en-CA", {
          timeZone: "Europe/Paris",
          year: "numeric",
          month: "2-digit",
          day: "2-digit",
        }).format(date);
        return new Date(`${raw}T00:00:00+01:00`);
      }

      function buildStreakDays(currentStreak) {
        const days = [];
        const nowParis = toParisDate(new Date());
        for (let offset = 6; offset >= 0; offset -= 1) {
          const day = new Date(nowParis);
          day.setDate(day.getDate() - offset);
          const short = day.toLocaleDateString("fr-FR", { weekday: "short" });
          const dayLabel = short.replace(".", "").slice(0, 3);
          const isHit = offset < Number(currentStreak || 0);
          days.push({ label: dayLabel, hit: isHit });
        }
        return days;
      }

      function formatDistance(distanceMeters) {
        const distance = Number(distanceMeters);
        if (!Number.isFinite(distance) || distance < 0) {
          return "—";
        }
        return distance >= 1000 ? `${(distance / 1000).toFixed(1)} km` : `${Math.round(distance)} m`;
      }

      function renderDailyPage(root, context) {
        const dailyData = context.dailyData || {};
        const profileData = context.profileData || {};
        const leaderboardRows = Array.isArray(context.dailyLeaderboard) ? context.dailyLeaderboard : [];

        const status = dailyData.userStatus || {};
        const attempts = Number(status.attempts_count || 0);
        const success = Boolean(status.success);
        const remaining = Math.max(0, 7 - attempts);
        const resultLine = success
          ? `✅ Défi réussi en ${attempts} essai${attempts > 1 ? "s" : ""}.`
          : attempts >= 7
            ? `❌ Défi terminé. Rue cible : « ${escapeHtml(dailyData.streetName || "Rue inconnue")} ».`
            : `⏳ ${remaining} essai${remaining > 1 ? "s" : ""} restant${remaining > 1 ? "s" : ""}.`;

        const currentStreak = Number(profileData.daily && profileData.daily.current_streak) || 0;
        const maxStreak = Number(profileData.daily && profileData.daily.max_streak) || 0;
        const streakDays = buildStreakDays(currentStreak);

        const topRows = leaderboardRows.slice(0, 10);
        const user = readCurrentUser();
        const currentUsername = String(user && user.username ? user.username : "").trim().toLowerCase();
        const userIndex = currentUsername
          ? leaderboardRows.findIndex((row) => String(row && row.username ? row.username : "").trim().toLowerCase() === currentUsername)
          : -1;

        root.innerHTML = `
          <div class="meta-grid meta-grid--two">
            <section class="meta-card">
              <h2 class="meta-card-title">Votre Daily du jour</h2>
              <p class="meta-inline-note">Date : ${escapeHtml(dailyData.date || "—")}</p>
              <p class="meta-inline-note">Rue cible : ${escapeHtml(dailyData.streetName || "Inconnue")}</p>
              <p class="meta-inline-note">${resultLine}</p>
              <p class="meta-inline-note">Meilleure distance : <strong>${escapeHtml(formatDistance(status.best_distance_meters))}</strong></p>
              <div style="margin-top: 10px; display: flex; gap: 8px; flex-wrap: wrap;">
                <a class="meta-back-link" href="/">Lancer le Daily</a>
                <a class="meta-back-link" href="/classement.html">Voir le classement complet</a>
              </div>
            </section>

            <section class="meta-card">
              <h2 class="meta-card-title">Série 7 jours</h2>
              <div class="daily-streak-grid">
                ${streakDays.map((day) => `
                  <div class="daily-streak-day ${day.hit ? "is-hit" : ""}">
                    <span class="daily-streak-label">${escapeHtml(day.label)}</span>
                    <span class="daily-streak-value">${day.hit ? "✓" : "·"}</span>
                  </div>
                `).join("")}
              </div>
              <p class="meta-inline-note" style="margin-top: 10px;">Série actuelle : <strong>${currentStreak}</strong> · Meilleure série : <strong>${maxStreak}</strong></p>
            </section>
          </div>

          <section class="meta-card" style="margin-top: 12px;">
            <h2 class="meta-card-title">Top du jour</h2>
            ${topRows.length ? `<div class="meta-list">${topRows.map((row, index) => `
              <article class="meta-list-card">
                <div class="meta-list-rank">#${index + 1}</div>
                <div class="meta-list-player">
                  <div class="meta-list-name"><span>${escapeHtml(row.avatar || "👤")}</span><span>${escapeHtml(row.username || "Anonyme")}</span></div>
                  <div class="meta-list-title">${row.success ? "Réussi" : "Non réussi"} · ${Number(row.attempts_count || 0)} essai${Number(row.attempts_count || 0) > 1 ? "s" : ""}</div>
                </div>
                <div class="meta-list-score">${escapeHtml(formatDistance(row.best_distance_meters))}</div>
              </article>
            `).join("")}</div>` : `<p class="meta-empty">Le top du jour n'est pas encore disponible.</p>`}
            <p class="meta-inline-note" style="margin-top: 8px;">
              ${userIndex >= 0 ? `Votre position aujourd'hui : #${userIndex + 1}.` : "Vous n'êtes pas encore classé aujourd'hui."}
            </p>
          </section>`;
      }

      async function loadDailyPage() {
        const root = document.getElementById("daily-root");
        const user = readCurrentUser();

        if (!user || !user.token) {
          renderNotConnected(root);
          return;
        }

        try {
          const headers = { Authorization: `Bearer ${user.token}` };

          const [dailyResponse, leaderboardResponse, profileResponse] = await Promise.all([
            fetch(`${API_URL}/api/daily`, { headers }),
            fetch(`${API_URL}/api/daily/leaderboard`),
            fetch(`${API_URL}/api/profile`, { headers }),
          ]);

          if (dailyResponse.status === 401 || dailyResponse.status === 403 || profileResponse.status === 401 || profileResponse.status === 403) {
            window.localStorage.removeItem("camino_user");
            renderNotConnected(root);
            return;
          }

          if (!dailyResponse.ok || !leaderboardResponse.ok || !profileResponse.ok) {
            throw new Error("Daily page API error");
          }

          const [dailyData, dailyLeaderboard, profileData] = await Promise.all([
            dailyResponse.json(),
            leaderboardResponse.json(),
            profileResponse.json(),
          ]);

          renderDailyPage(root, {
            dailyData,
            dailyLeaderboard,
            profileData,
          });
        } catch (error) {
          console.warn("Daily result page error:", error);
          root.innerHTML = `
            <section class="meta-card">
              <h2 class="meta-card-title">Résultats indisponibles</h2>
              <p class="meta-inline-note">Impossible de charger les informations du Daily pour le moment.</p>
              <div style="margin-top: 12px;"><a class="meta-back-link" href="/">Retour au jeu</a></div>
            </section>`;
        }
      }

      loadDailyPage();
    })();
  </script>
</body>

</html>
